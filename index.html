<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ぴくノヴァ</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#000,#111);
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#1c1c1c;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(255,255,255,0.1);
}

h1{
    margin-bottom:5px;
    font-size:28px;
}

p{
    color:#aaa;
    margin-bottom:25px;
}

a{
    display:block;
    text-decoration:none;
    color:white;
    background:#000;
    padding:18px;
    margin:14px 0;
    border-radius:14px;
    border:1px solid <#1497186336610975856>33;
    font-weight:bold;
    font-size:18px;
}

a:hover{
    background:white;
    color:black;
    transform:scale(1.03);
}

a:active{
    transform:scale(0.96);
}
</style>

</head>
