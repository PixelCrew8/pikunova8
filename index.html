<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ぴくノヴァ</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#000,#111);
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#1c1c1c;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(255,255,255,0.1);
}

h1{
    margin-bottom:5px;
    font-size:28px;
}

p{
    color:#aaa;
    margin-bottom:25px;
}

/* 共通ボタン */
a{
    display:block;
    text-decoration:none;
    padding:18px;
    margin:14px 0;
    border-radius:14px;
    font-weight:bold;
    font-size:18px;
    transition:0.2s;
}

/* TikTok：黒＋白＋赤＋水色 */
.tiktok{
    background:#000;
    color:white;
    border:1px solid #25F4EE;
    position:relative;
}
.tiktok::before{
    content:"●";
    color:#ff0050;
    margin-right:6px;
}

/* X：白黒 */
.x{
    background:#000;
    color:white;
    border:1px solid #fff;
}

/* Instagram：赤・黄・紫グラデ */
.instagram{
    background:linear-gradient(45deg,#f58529,#feda77,#dd2a7b,#8134af);
    color:white;
    border:none;
}

/* YouTube：赤白 */
.youtube{
    background:#ff0000;
    color:white;
    border:1px solid #fff;
}

/* ホバー */
a:hover{
    transform:scale(1.03);
    filter:brightness(1.1);
}

a:active{
    transform:scale(0.96);
}
</style>

</head>

<body>

<div class="card">

<h1>ぴくノヴァ</h1>

<p>ぴくノヴァの公式サイト</p>

<a class="tiktok" href="https://www.tiktok.com/@pixelcrew8?_r=1&_t=ZS-9670el96nS8">TikTok</a>

<a class="x" href="https://x.com/pixelcrew8?s=21">X</a>

<a class="instagram" href="https://www.instagram.com/pikuno8?igsh=MTd2c2prdXRiZjZlZQ%3D%3D&utm_source=qr">Instagram</a>

<a class="youtube" href="https://www.youtube.com/@%E3%83%94%E3%82%AF%E3%83%8E%E3%83%B4%E3%82%A1">YouTube</a>

</div>

</body>
</html>
